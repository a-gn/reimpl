[tool.poetry]
name = "3d-reimpl"
version = "0.1.0"
description = "Implementations of 3D reconstruction methods."
authors = ["Arno Gobbin <a-gn-pub@outlook.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
jax = {extras = ["cuda11-pip"], version = "^0.4.23"}

[[tool.poetry.source]]
name = "jax_cuda_releases"
url = "https://storage.googleapis.com/jax-releases/jax_cuda_releases.html"
priority = "primary"

[[tool.poetry.source]]
name = "PyPI"
priority = "primary"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

# pyproject.toml
[tool.pytest.ini_options]
minversion = "7.0"
testpaths = [
    "test",
]
pythonpath = [
    "src",
]
