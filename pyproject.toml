[tool.poetry]
name = "3d-reimpl"
version = "0.1.0"
description = "Implementations of 3D reconstruction methods."
authors = ["Arno Gobbin <a-gn-pub@outlook.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
jaxlib = {url = "https://storage.googleapis.com/jax-releases/cuda11/jaxlib-0.4.23%2Bcuda11.cudnn86-cp311-cp311-manylinux2014_x86_64.whl"}
jax = "^0.4.23"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
