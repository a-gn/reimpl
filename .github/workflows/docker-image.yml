name: Dev Containers image

on:
  push:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    env:
      IMAGE_REPO: 265165126141.dkr.ecr.eu-north-1.amazonaws.com/a-gn/reimpl-dev-containers
      VERSION_TAG: gha_run_${{github.run_id}}_sha_${{github.sha}}

    steps:
    - uses: actions/checkout@v3
    - name: Build the Docker image
      run: docker build . --file .devcontainer/Dockerfile --tag "$IMAGE_REPO:$VERSION_TAG"
    - name: Push Docker image
      run: |
        docker push "$IMAGE_REPO:$VERSION_TAG"
        docker tag "$IMAGE_REPO:$VERSION_TAG" "$IMAGE_REPO:latest"
        docker push "$IMAGE_REPO:latest"
