name: Dev Containers image

on:
  push:
    branches: [ "main" ]
    paths:
      - ".devcontainer/Dockerfile"
      - ".github/workflows/docker-image.yml"

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      IMAGE_REPO: 265165126141.dkr.ecr.us-east-1.amazonaws.com/a-gn/reimpl-dev-containers
      VERSION_TAG: gha_run_${{github.run_id}}_sha_${{github.sha}}

    steps:
    - uses: actions/checkout@v3
    - uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::265165126141:role/github_cicd_private_repos_a-gn
        aws-region: us-east-1
        role-session-name: GitHub_to_AWS_via_FederatedOIDC
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
    - name: Build the Docker image
      run: docker build . --file .devcontainer/Dockerfile --tag "$IMAGE_REPO:$VERSION_TAG"
    - name: Push Docker image
      run: |
        docker push "$IMAGE_REPO:$VERSION_TAG"
        docker tag "$IMAGE_REPO:$VERSION_TAG" "$IMAGE_REPO:latest"
        docker push "$IMAGE_REPO:latest"
